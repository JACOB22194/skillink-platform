databases:
  - name: skillink-db
    plan: free
    databaseName: skillink_db
    user: skillink_user

services:
  # ── Backend API (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: skillink-backend
    runtime: docker
    repo: https://github.com/JACOB22194/skillink-platform
    rootDir: Skilllink-backend
    dockerfilePath: ./Dockerfile
    dockerCommand: sh start.sh
    plan: free
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillink-db
          property: connectionString
      # DATABASE_REPLICA_URL intentionally omitted — db.py falls back to
      # DATABASE_URL automatically when unset.
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Render blocks outbound SMTP ports, so email goes through Resend's
      # HTTP API instead. Setting RESEND_API_KEY switches email_service.py
      # to that path automatically (see services/email_service.py).
      - key: RESEND_API_KEY
        sync: false
      # Must be onboarding@resend.dev (Resend's shared test sender) unless
      # you've verified your own domain with Resend.
      - key: MAIL_FROM
        sync: false
      # Used to build activation/reset-password links in emails.
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_STARTTLS
        value: "False"
      - key: MAIL_SSL_TLS
        value: "True"
      - key: LOG_LEVEL
        value: INFO
      # Fill in after first deploy, once you know the real frontend/AI URLs:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_SERVICE_URL
        sync: false

  # ── AI / recommendation service ─────────────────────────────────────────────
  - type: web
    name: skillink-ai
    runtime: docker
    repo: https://github.com/JACOB22194/skillink-platform
    rootDir: Skillink-AI
    dockerfilePath: ./dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: HF_HOME
        value: /app/.hf_cache
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false
      # /match's internal inference budget. 25s leaves margin under the
      # backend's 30s caller timeout (recommend_router.py,
      # matching_service.py). Raise further if free-tier CPU is still
      # too slow for larger candidate pools.
      - key: AI_INFERENCE_TIMEOUT
        value: "25"

  # ── Frontend (static production build — NOT the Vite dev server) ──────────
  - type: web
    name: skillink-frontend
    runtime: static
    repo: https://github.com/JACOB22194/skillink-platform
    rootDir: Skilllink-Frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    envVars:
      # Fill in with the real skillink-backend URL after first deploy —
      # Vite bakes this in at BUILD time, so it must be set before building.
      - key: VITE_API_BASE_URL
        sync: false
      # Used for direct frontend -> AI service calls (live preview while
      # typing a project description). Also baked in at build time.
      - key: VITE_AI_SERVICE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
