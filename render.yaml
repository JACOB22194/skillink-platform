databases:
  - name: skillink-db
    plan: free
    databaseName: skillink_db
    user: skillink_user

services:
  # ── Backend API (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: skillink-backend
    runtime: docker
    repo: https://github.com/JACOB22194/skillink-platform
    rootDir: Skilllink-backend
    dockerfilePath: ./Dockerfile
    dockerCommand: sh start.sh
    plan: free
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillink-db
          property: connectionString
      # DATABASE_REPLICA_URL intentionally omitted — db.py falls back to
      # DATABASE_URL automatically when unset.
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      # Must match MAIL_USERNAME exactly — Gmail SMTP rejects/bounces sends
      # where the From address doesn't match the authenticated account.
      - key: MAIL_FROM
        sync: false
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_STARTTLS
        value: "False"
      - key: MAIL_SSL_TLS
        value: "True"
      - key: LOG_LEVEL
        value: INFO
      # Fill in after first deploy, once you know the real frontend/AI URLs:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_SERVICE_URL
        sync: false

  # ── AI / recommendation service ─────────────────────────────────────────────
  - type: web
    name: skillink-ai
    runtime: docker
    repo: https://github.com/JACOB22194/skillink-platform
    rootDir: Skillink-AI
    dockerfilePath: ./dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: HF_HOME
        value: /app/.hf_cache
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend (static production build — NOT the Vite dev server) ──────────
  - type: web
    name: skillink-frontend
    runtime: static
    repo: https://github.com/JACOB22194/skillink-platform
    rootDir: Skilllink-Frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    envVars:
      # Fill in with the real skillink-backend URL after first deploy —
      # Vite bakes this in at BUILD time, so it must be set before building.
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
