services:

  backend:
    build: .
    container_name: skillink_backend_
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://skillink_user:password123@db:5432/skillink_db}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai:8001}
      - SECRET_KEY=${SECRET_KEY:-skillink-super-secret-jwt-key-2026-abcdef123xyz789102004}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    networks:
      - skillink_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: skillink_db_
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillink_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-skillink_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - skillink_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-skillink_user}", "-d", "${POSTGRES_DB:-skillink_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  skillink_network:
    driver: bridge

volumes:
  db_data: