name: Keep AI service warm

# Render's free tier spins services down after ~15 minutes of inactivity.
# This pings the health endpoint every 10 minutes so the AI service never
# fully sleeps, avoiding cold-start 503s during automatic project matching.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping skillink-ai health endpoint
        run: |
          curl -sf -w "HTTP %{http_code}\n" https://skillink-ai.onrender.com/health || true
